name: 🚀 RFP Proposal
description: Submit a proposal for an open Logos RFP
title: "[PROPOSAL] RFP-XXX — Project Name"
labels: ["proposal", "in-review"]
assignees: ["hackyguru"]

body:
  - type: input
    id: rfp-id
    attributes:
      label: RFP ID
      description: Which RFP are you applying for?
      placeholder: RFP-001
    validations:
      required: true

  - type: input
    id: project-name
    attributes:
      label: Project Name
      placeholder: Project name used in this proposal
    validations:
      required: true

  - type: input
    id: team-name
    attributes:
      label: Team or Organization Name
      placeholder: Acme Labs or Independent
    validations:
      required: true

  - type: input
    id: primary-contact
    attributes:
      label: Primary Contact
      description: Email Telegram or Discord handle that we can use to contact you
      placeholder: founder@acme.xyz or @telegram or discordUser
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 👥 Team Profile
        Provide details for all team members in one place.

        Include:
        • Name or pseudonym  
        • Social links (GitHub Twitter LinkedIn website)  
        • Role in the project  
        • Status (full-time part-time contractor)  

  - type: textarea
    id: team-profile
    attributes:
      label: Team Members
      placeholder: |
        Member 1  
        Name or pseudonym:  
        Social links:  
        Role:  
        Status:

        Member 2  
        Name or pseudonym:  
        Social links:  
        Role:  
        Status:
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Project Summary
      description: What are you building and why does it matter?
      placeholder: Provide a clear 2–4 paragraph overview.
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: Technical Approach
      description: Describe architecture stack integrations and anticipated challenges.
    validations:
      required: true

  - type: textarea
    id: milestones
    attributes:
      label: Milestones and Timeline
      description: Break the project into clear milestones with estimated timelines.
      placeholder: |
        Milestone 1 — Design (2 weeks)  
        Milestone 2 — Core build (3 weeks)  
        Milestone 3 — Testing and documentation (2 weeks)
    validations:
      required: true

  - type: input
    id: budget
    attributes:
      label: Requested Budget (USD)
      placeholder: $10,000
    validations:
      required: true

  - type: textarea
    id: experience
    attributes:
      label: Relevant Experience
      description: Share links to shipped products GitHub repositories or prior work.
      placeholder: URLs are preferred over resumes.
    validations:
      required: true

  - type: textarea
    id: maintenance
    attributes:
      label: Post-Delivery Plan
      description: Who maintains this project after completion and how will support be handled?

  - type: checkboxes
    id: permissions
    attributes:
      label: Permissions and Consent
      description: Please confirm the following.
      options:
        - label: I confirm Logos may contact me using the primary contact information provided above for follow-ups and next steps.
          required: true
        - label: I consent to Logos using information from this proposal publicly such as blogs case studies social posts or analytical reporting. Redactions can be requested at any time.
          required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Program Requirements
      options:
        - label: We understand this project must be open-sourced under the MIT License unless explicitly approved otherwise.
          required: true
        - label: We are prepared to deliver milestone-based outcomes.
          required: true
