name: 🚀 RFP Proposal
description: Submit a proposal for an open Logos RFP
title: "[PROPOSAL] RFP-XXX — Your Project Name"
labels: ["proposal", "in-review"]
assignees: ["hackyguru"]

body:
  - type: input
    id: rfp-id
    attributes:
      label: RFP ID
      description: Which RFP are you applying for?
      placeholder: RFP-001
    validations:
      required: true

  - type: input
    id: project-name
    attributes:
      label: Your Project Name
      placeholder: The name of project that will implement the RFP
    validations:
      required: true

  - type: input
    id: team-name
    attributes:
      label: Team or Organization Name
      placeholder: Acme Labs or Independent
    validations:
      required: true

  - type: input
    id: primary-contact
    attributes:
      label: Primary Contact
      description: Email, Telegram, Discord or Signal handle that we can use to contact you
      placeholder: founder@acme.xyz or @telegram or discordUser
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 👥 Team Profile
        Provide details for all team members in one place.

        Include:
        • Name or pseudonym  
        • Social links (GitHub Twitter LinkedIn website)  
        • Role in the project  
        • Status (full-time part-time contractor)  

  - type: textarea
    id: team-profile
    attributes:
      label: Team Members
      placeholder: |
        Member 1  
        Name or pseudonym:  
        Social links:  
        Role:  
        Status:

        Member 2  
        Name or pseudonym:  
        Social links:  
        Role:  
        Status:
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Project Summary
      description: Your take on the RF and why does it matter?
      placeholder: Provide a clear 2–4 paragraph overview.
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: Technical Approach
      description: Describe architecture stack integrations and anticipated challenges.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## ⏱ Milestones
        Break the project into clear milestones. For each milestone, specify:
        • A short description of deliverables
        • The payout amount (in USD) upon completion
        • The estimated duration or deadline

        Include an **Audit milestone** if your project handles user funds, implements cryptographic primitives, or requires a security review before mainnet deployment.

  - type: textarea
    id: milestones
    attributes:
      label: Milestones, Payout and Timeline
      description: One milestone per block. Include payout and duration for each. Add an audit milestone if applicable.
      placeholder: |
        Milestone 1 — Design and specification
        Payout: $2,000
        Duration: 2 weeks
        Deliverables: architecture doc, API spec, UX wireframes

        Milestone 2 — Core implementation
        Payout: $5,000
        Duration: 3 weeks
        Deliverables: smart contract / program deployed on devnet, CLI

        Milestone 3 — Testing and documentation
        Payout: $2,000
        Duration: 2 weeks
        Deliverables: test suite, README, mini-app

        Milestone 4 — Audit (if applicable)
        Payout: $1,000
        Duration: 2 weeks
        Deliverables: audit report, remediation of findings
    validations:
      required: true

  - type: input
    id: budget
    attributes:
      label: Total Requested Budget (USD)
      description: Must equal the sum of all milestone payouts above.
      placeholder: $10,000
    validations:
      required: true

  - type: textarea
    id: experience
    attributes:
      label: Relevant Experience
      description: Share links to shipped products GitHub repositories or prior work.
      placeholder: URLs are preferred over resumes.
    validations:
      required: true

  - type: textarea
    id: maintenance
    attributes:
      label: Post-Delivery Plan
      description: Who maintains this project after completion and how will support be handled?

  - type: checkboxes
    id: permissions
    attributes:
      label: Permissions and Consent
      description: Please confirm the following.
      options:
        - label: I confirm Logos may contact me using the primary contact information provided above for follow-ups and next steps.
          required: true
        - label: I consent to Logos using information from this proposal publicly such as blogs case studies social posts or analytical reporting. Redactions can be requested at any time.
          required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Program Requirements
      options:
        - label: We understand this project must be open-sourced under the MIT and Apache 2.0 Licenses unless explicitly approved otherwise.
          required: true
        - label: We are prepared to deliver milestone-based outcomes.
          required: true
