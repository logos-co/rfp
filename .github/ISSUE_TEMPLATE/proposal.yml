name: 🚀 RFP Proposal
description: Submit a proposal for an open Logos RFP
title: "[PROPOSAL] RFP-XXX — Give a cool name for your project"
labels: ["proposal", "under-review"]
assignees: ["hackyguru"]

body:
  - type: input
    id: rfp-id
    attributes:
      label: RFP ID
      description: Which RFP are you applying for?
      placeholder: RFP-001
    validations:
      required: true

  - type: input
    id: project-name
    attributes:
      label: Project Name
      placeholder: Project name used in this proposal
    validations:
      required: true

  - type: input
    id: team-name
    attributes:
      label: Team / Organization Name
      placeholder: Acme Labs (or "Independent")
    validations:
      required: true

  - type: input
    id: primary-contact
    attributes:
      label: Primary Contact
      description: Email, Telegram, or Discord handle (we will use this to contact you).
      placeholder: founder@acme.xyz / @handle / user#0000
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 👥 Team Profile
        Provide details for your team members. Member 1 is required; add more members if applicable.

  - type: textarea
    id: team-member-1
    attributes:
      label: Team Member 1 (required)
      description: Name/pseudonym, socials, preferred contact, role, and status.
      placeholder: |
        Name / Pseudonym:
        Socials (GitHub, Twitter/X, LinkedIn, website):
        Contact (email/telegram/discord):
        Role in the project:
        Status (full-time/part-time/contractor):
    validations:
      required: true

  - type: textarea
    id: team-member-2
    attributes:
      label: Team Member 2 (optional)
      placeholder: |
        Name / Pseudonym:
        Socials (GitHub, Twitter/X, LinkedIn, website):
        Contact (email/telegram/discord):
        Role in the project:
        Status (full-time/part-time/contractor):

  - type: textarea
    id: team-member-3
    attributes:
      label: Team Member 3 (optional)
      placeholder: |
        Name / Pseudonym:
        Socials (GitHub, Twitter/X, LinkedIn, website):
        Contact (email/telegram/discord):
        Role in the project:
        Status (full-time/part-time/contractor):

  - type: textarea
    id: team-member-4
    attributes:
      label: Team Member 4 (optional)
      placeholder: |
        Name / Pseudonym:
        Socials (GitHub, Twitter/X, LinkedIn, website):
        Contact (email/telegram/discord):
        Role in the project:
        Status (full-time/part-time/contractor):

  - type: textarea
    id: summary
    attributes:
      label: Project Summary
      description: What are you building and why does it matter?
      placeholder: A 2–4 paragraph overview.
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: Technical Approach
      description: Architecture, stack, integrations, and any anticipated challenges.
    validations:
      required: true

  - type: textarea
    id: milestones
    attributes:
      label: Milestones & Timeline
      description: Break the project into clear milestones with estimated timelines.
      placeholder: |
        Milestone 1 — Design (2 weeks)
        Milestone 2 — Core build (3 weeks)
        Milestone 3 — Testing & docs (2 weeks)
    validations:
      required: true

  - type: input
    id: budget
    attributes:
      label: Requested Budget (USD)
      placeholder: $10,000
    validations:
      required: true

  - type: textarea
    id: experience
    attributes:
      label: Relevant Experience
      description: Links to shipped products, GitHub repos, or prior work.
      placeholder: URLs preferred over resumes.
    validations:
      required: true

  - type: textarea
    id: maintenance
    attributes:
      label: Post-Delivery Plan
      description: Who maintains this project after completion?

  - type: checkboxes
    id: permissions
    attributes:
      label: Permissions & Consent
      description: Please confirm the following.
      options:
        - label: I confirm Logos may contact me using the primary contact information provided above for follow-ups and next steps.
          required: true
        - label: I consent to Logos using information from this proposal publicly (e.g., in blogs, case studies, social posts) and/or for analytical reporting. (You can request redactions at any time.)
          required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Program Requirements
      options:
        - label: We understand this project must be open-sourced under the MIT License unless otherwise approved.
          required: true
        - label: We are prepared to deliver milestone-based outcomes.
          required: true
